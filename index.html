    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Nice and Co.?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nice and Co. is a Cleveland-based company that acts as an Amazon and Wayfair 1P Vendor of Record for brands. We manage Vendor Central operations, submit ASINs, handle co-op fees, chargebacks, and POs, and remit payments to brand partners."
          }
        },
        {
          "@type": "Question",
          "name": "What is Amazon 1P vendor management?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Amazon 1P (first-party) means Amazon buys inventory directly from a vendor via purchase orders (POs) and resells it. A vendor management company like Nice and Co. acts as the Vendor of Record, handling all Vendor Central operations including ASIN submissions, co-op fee administration, shipment compliance, and remittance."
          }
        },
        {
          "@type": "Question",
          "name": "How does the Nice and Co. co-op partnership model work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Brands partner with Nice and Co. as a co-op client. Nice and Co. submits their products to Amazon and Wayfair under the Nice and Co. vendor code, manages all Vendor Central operations, and remits net payments to the brand after deducting a co-op fee per remittance. There are no upfront fees."
          }
        },
        {
          "@type": "Question",
          "name": "Can Nice and Co. help if my Amazon Vendor account was terminated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. If Amazon terminated your Vendor Central account, Nice and Co. can onboard your catalog under our established vendor code. Most brands recovering from a vendor termination lose 30-60% of revenue in the first 90 days. We help you recover that revenue through 1P access without needing your own vendor invitation."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need an Amazon vendor invitation to work with Nice and Co.?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Nice and Co. already holds an established Amazon Vendor Central account. Brands partner with us as a co-op client and list their products through our vendor code, bypassing the need for an Amazon vendor invitation (AVS)."
          }
        },
        {
          "@type": "Question",
          "name": "Does Nice and Co. manage Wayfair as well?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. In addition to Amazon Vendor Central, Nice and Co. manages Wayfair vendor relationships, unlocking a second 1P wholesale revenue channel for brand partners."
          }
        },
        {
          "@type": "Question",
          "name": "How does Nice and Co. get paid?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nice and Co. earns a co-op fee per remittance — deducted from the Amazon or Wayfair payment before it is passed to the brand partner. There are no upfront fees or monthly retainers."
          }
        }
      ]
    }
    </script>
